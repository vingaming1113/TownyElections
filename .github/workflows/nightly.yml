name: Nightly

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_id }}
          name: Nightly ${{ github.run_id }}
          body: |
            Automated nightly build from commit ${{ github.sha }}.

            This is an unreleased development build and may be unstable.
          prerelease: true
          files: target/TownyElections-*.jar

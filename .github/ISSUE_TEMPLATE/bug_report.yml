name: Bug report
description: Report a problem with TownyElections
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the
        sections below so the issue can be reproduced and fixed quickly.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I run /election vote ..., the plugin ...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can someone else reproduce this?
      placeholder: |
        1. Start an election with /election start
        2. Register two candidates
        3. Vote with /election vote ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console log / stack trace
      description: >
        Paste any relevant console output. If it is long, use a paste service
        such as https://mclo.gs and link it here.
      render: text
    validations:
      required: false

  - type: input
    id: te-version
    attributes:
      label: TownyElections version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: server-version
    attributes:
      label: Server software & version
      description: Output of /version
      placeholder: "Paper 1.21.4 build 123"
    validations:
      required: true

  - type: input
    id: towny-version
    attributes:
      label: Towny version
      placeholder: "0.102.0.13"
    validations:
      required: true

  - type: textarea
    id: other-plugins
    attributes:
      label: Other relevant plugins
      description: e.g. PlaceholderAPI, permission plugins, economy plugins.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checklist
      options:
        - label: I am running the latest release of TownyElections.
          required: true
        - label: I searched existing issues and this is not a duplicate.
          required: true

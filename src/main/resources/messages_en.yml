# TownyElections - message file (locale: en)
# Supports legacy '&' colour codes and hex '&#RRGGBB'.
# Available placeholders vary per message; common ones are shown inline.

prefix: "&8[&bElections&8]&r "

general:
  no-permission: "&cYou do not have permission to do that."
  players-only: "&cThis command can only be used by players."
  not-a-resident: "&cYou are not a registered Towny resident."
  no-town: "&cYou must belong to a town to do that."
  reloaded: "&aConfiguration reloaded successfully."
  unknown-command: "&cUnknown sub-command. Use &f/{label} {help}&c."
  invalid-number: "&cThat is not a valid number."

election:
  none-active: "&cThere is no active election in your town."
  already-active: "&cThere is already an active election in &f{town}&c."
  started-nomination: "&aAn election has begun in &f{town}&a! Nominations are open for &e{duration}&a. Use &f/{label} {run}&a to stand as a candidate."
  announce-server-start: "&6&lElection!&e An election has begun in &f{town}&e."
  nominations-closed-voting-open: "&aNominations are closed. Voting (&f{system}&a) is now open for &e{duration}&a in &f{town}&a. Use &f/{label} {vote} <candidate>&a."
  cancelled: "&cThe election in &f{town}&c has been cancelled. No winner was declared."
  cancelled-not-enough-candidates: "&cThe election in &f{town}&c was cancelled: only &e{count}&c candidate(s) registered (minimum &e{min}&c)."
  concluded: "&aThe election in &f{town}&a has concluded!"
  town-too-small: "&cThis town needs at least &e{min}&c residents to hold an election."
  time-remaining-nomination: "&7Nominations close in &f{time}&7."
  time-remaining-voting: "&7Voting closes in &f{time}&7."
  phase-nomination: "&eNOMINATIONS"
  phase-voting: "&aVOTING"
  phase-runoff: "&6RUNOFF"
  system-plurality: "&fPlurality"
  system-ranked-choice: "&fRanked Choice"
  system-approval: "&fApproval"

candidate:
  registered: "&aYou are now a candidate in the &f{town}&a election. Good luck!"
  already-registered: "&cYou are already a candidate in this election."
  withdrawn: "&eYou have withdrawn from the &f{town}&e election."
  not-a-candidate: "&cYou are not a candidate in the current election."
  registration-closed: "&cCandidate registration is closed; the nomination phase has ended."
  max-reached: "&cThe maximum number of candidates (&e{max}&c) has been reached."
  cost-charged: "&7A candidacy fee of &f{cost}&7 was charged."
  cannot-afford: "&cYou cannot afford the candidacy fee of &f{cost}&c."
  self-registered-broadcast: "&e{player}&7 has entered the race for &f{town}&7!"

campaign:
  set: "&aYour campaign message has been set."
  too-long: "&cYour campaign message is too long (max &e{max}&c characters)."
  blocked: "&cYour campaign message contains disallowed content."
  empty: "&cUsage: &f/{label} {campaign} <message>"
  header: "&8&m----&r &bCampaign: &f{candidate} &8&m----"
  body: "&7{message}"

party:
  set: "&aYour political party has been set to &f{party}&a."
  current: "&7Your current political party is &f{party}&7. Use &f/{label} {party_command} <name>&7 to change it, or &f/{label} {party_command} leave&7 to become independent."
  left: "&aYou have left your political party and are now &f{party}&a."
  renamed: "&aRenamed political party &f{old}&a to &f{new}&a for this election."
  no-such-party: "&cNo current party named &f{old}&c exists in this election."
  max-parties: "&cThis election has reached the maximum number of political parties."
  joined-broadcast: "&e{player}&7 is now campaigning with &f{party}&7 in &f{town}&7."
  rename-usage: "&cUsage: &f/{label} {party} rename <old> <new>"
  too-long: "&cYour political party name is too long (max &e{max}&c characters)."
  empty: "&cUsage: &f/{label} {party} <existing party or new name>"

parties:
  header: "&8&m-----&r &bElection Parties &8- &f{town} &8&m-----"
  result-header: "&8&m-----&r &bParty Results &8- &f{town} &8&m-----"
  none: "&7No candidates have registered parties yet."
  entry: "&8 - &f{party} &8(&e{votes} votes&8, &b{count} candidate(s)&8) &7{candidates}"
  entry-hidden: "&8 - &f{party} &8(&b{count} candidate(s)&8) &7{candidates}"

vote:
  cast: "&aYou voted for &f{candidate}&a."
  changed: "&aYou changed your vote to &f{candidate}&a."
  ballot-cast: "&aYour ballot has been cast: &f{ballot}&a."
  ballot-changed: "&aYour ballot has been updated: &f{ballot}&a."
  ballot-cleared: "&eYour ballot has been cleared."
  nothing-to-clear: "&cYou have not cast a ballot yet."
  ranked: "&aYou ranked &f{candidate}&a as preference &e#{rank}&a. Ballot: &f{ballot}"
  unranked: "&eYou removed &f{candidate}&e from your ballot. Ballot: &f{ballot}"
  approved: "&aYou approved &f{candidate}&a. Ballot: &f{ballot}"
  unapproved: "&eYou withdrew your approval of &f{candidate}&e. Ballot: &f{ballot}"
  already-voted: "&cYou have already voted. Vote changing is disabled."
  not-open: "&cVoting is not currently open."
  no-such-candidate: "&cThere is no candidate named &f{name}&c in this election."
  cannot-self-vote: "&cYou may not vote for yourself."
  usage: "&cUsage: &f/{label} {vote} <candidate>"
  usage-ranked: "&cUsage: &f/{label} {vote} <first choice> [second choice] ...&c (rank candidates in order of preference)"
  usage-approval: "&cUsage: &f/{label} {vote} <candidate> [candidate] ...&c (approve every candidate you support)"
  not-eligible: "&cOnly residents of &f{town}&c may vote in this election."
  reminder: "&eVoting in &f{town}&e closes in &f{time}&e and you have not voted yet! Use &f/{label} {vote} <candidate>&e."


